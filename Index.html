            ArrowRightLeft: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>
        };

        // --- מודל התראות חלופי ל-Alert / Confirm ---
        const CustomDialog = ({ dialog, onClose }) => {
            if (!dialog) return null;
            return (
                <div className="fixed inset-0 z-[200] bg-black/50 flex items-center justify-center p-4 fade-in">
                    <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl modal-anim text-center">
                        <p className="text-lg font-bold text-slate-800 mb-6 whitespace-pre-wrap">{dialog.message}</p>
                        <div className="flex gap-3 justify-center">
                            {dialog.type === 'confirm' && (
                                <button onClick={() => { dialog.onConfirm(); onClose(); }} className="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition-all">
                                    אישור
                                </button>
                            )}
                            <button onClick={onClose} className={`flex-1 ${dialog.type === 'confirm' ? 'bg-slate-100 text-slate-700' : 'bg-blue-500 text-white'} py-3 rounded-xl font-bold shadow-md active:scale-95 transition-all`}>
                                {dialog.type === 'confirm' ? 'ביטול' : 'סגור'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- פונקציית המרה ל-UTM ---
        function latLonToUTM(lat, lon) {
            const a = 6378137; const eccSquared = 0.00669438; const k0 = 0.9996;
            let zoneNumber = Math.floor((lon + 180) / 6) + 1;
            const lonOrigin = (zoneNumber - 1) * 6 - 180 + 3;
            const lonOriginRad = lonOrigin * (Math.PI / 180);
            const latRad = lat * (Math.PI / 180); const lonRad = lon * (Math.PI / 180);
            const eccPrimeSquared = eccSquared / (1 - eccSquared);
            const N = a / Math.sqrt(1 - eccSquared * Math.pow(Math.sin(latRad), 2));
            const T = Math.pow(Math.tan(latRad), 2); const C = eccPrimeSquared * Math.pow(Math.cos(latRad), 2);
            const A = Math.cos(latRad) * (lonRad - lonOriginRad);
            const M = a * ((1 - eccSquared / 4 - 3 * Math.pow(eccSquared, 2) / 64 - 5 * Math.pow(eccSquared, 3) / 256) * latRad - (3 * eccSquared / 8 + 3 * Math.pow(eccSquared, 2) / 32 + 45 * Math.pow(eccSquared, 3) / 1024) * Math.sin(2 * latRad) + (15 * Math.pow(eccSquared, 2) / 256 + 45 * Math.pow(eccSquared, 3) / 1024) * Math.sin(4 * latRad) - (35 * Math.pow(eccSquared, 3) / 3072) * Math.sin(6 * latRad));
            let easting = k0 * N * (A + (1 - T + C) * Math.pow(A, 3) / 6 + (5 - 18 * T + Math.pow(T, 2) + 72 * C - 58 * eccPrimeSquared) * Math.pow(A, 5) / 120) + 500000.0;
            let northing = k0 * (M + N * Math.tan(latRad) * (Math.pow(A, 2) / 2 + (5 - T + 9 * C + 4 * Math.pow(C, 2)) * Math.pow(A, 4) / 24 + (61 - 58 * T + Math.pow(T, 2) + 600 * C - 330 * eccPrimeSquared) * Math.pow(A, 6) / 720));
            if (lat < 0) northing += 10000000.0;
            const letters = "CDEFGHJKLMNPQRSTUVWXX";
            let letterIndex = Math.floor((lat + 80) / 8);
            if (letterIndex < 0) letterIndex = 0; if (letterIndex > 20) letterIndex = 20;
            return { easting, northing, zone: zoneNumber, letter: letters.charAt(letterIndex) };
        }

        const Logo = ({ size = "normal" }) => (
            <div className={`flex flex-col items-center justify-center select-none ${size === 'small' ? 'scale-75' : ''}`}>
                <div className="w-16 h-10 relative flex items-center justify-center">
                   <svg viewBox="0 0 200 100" fill="none" className="w-full h-full" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round">
                     <path d="M40 80 L70 20 L100 80" stroke="#FAD335" />
                     <path d="M80 80 L110 20 L140 80" stroke="#84CC16" />
                     <path d="M120 80 L150 20 L180 80" stroke="#38B6FF" />
                   </svg>
                </div>
                <div className="text-center leading-3 mt-1">
                    <span className="block text-[14px] font-bold text-gray-600">גולן סולאר</span>
                    <span className="block text-[10px] text-gray-400">מחויבים לרווח שלך</span>
                </div>
            </div>
        );

        // --- ווידג'טים לממשק הטכנאי ---
        const LocationWidget = () => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [copied, setCopied] = useState(false);

            const getLocation = () => {
                setLoading(true); setError(''); setData(null); setCopied(false);
                if (!navigator.geolocation) {
                    setError('הדפדפן לא תומך בקבלת מיקום.'); setLoading(false); return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const utm = latLonToUTM(pos.coords.latitude, pos.coords.longitude);
                        setData({ utm, altitude: pos.coords.altitude });
                        setLoading(false);
                    },
                    (err) => {
                        setError('שגיאה בקבלת המיקום. ודא שה-GPS פועל במכשיר.');
                        setLoading(false);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            };

            const handleCopy = () => {
                if(!data) return;
                const text = `נ.צ UTM: ${data.utm.zone}${data.utm.letter} | X: ${data.utm.easting.toFixed(2)} | Y: ${data.utm.northing.toFixed(2)}${data.altitude ? ` | גובה: ${data.altitude.toFixed(2)}מ'` : ''}`;
                try {
                    const tempInput = document.createElement("textarea");
                    tempInput.value = text;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand("copy");
                    document.body.removeChild(tempInput);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch(e) {
                    console.error("Copy failed", e);
                }
            };

            return (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 mb-4 mx-4">
                    <button onClick={getLocation} disabled={loading} className="w-full bg-blue-50 text-blue-600 font-bold py-3 rounded-xl border border-blue-100 active:scale-95 transition-all flex justify-center items-center gap-2">
                        <Icons.MapPin size={18} />
                        {loading ? 'מאתר מיקום מדויק...' : 'דגום נ.צ וגובה (UTM)'}
                    </button>
                    {error && <div className="text-red-500 text-sm mt-3 text-center font-medium">{error}</div>}
                    {data && (
                        <div className="mt-4 p-3 bg-slate-50 rounded-xl border border-slate-100 relative fade-in">
                            <button onClick={handleCopy} className={`absolute top-3 left-3 p-2 rounded-lg transition-colors flex items-center gap-1 text-xs font-bold ${copied ? 'bg-green-100 text-green-700' : 'bg-white text-slate-500 shadow-sm border border-slate-200 active:scale-95'}`}>
                                {copied ? <><Icons.CheckCircle2 size={14} /> הועתק</> : <><Icons.Copy size={14} /> העתק</>}
                            </button>
                            <div className="text-right pr-2">
                                <div className="text-sm text-slate-500 font-bold mb-2">נתוני מיקום נוכחי:</div>
                                <div className="text-slate-700 font-mono text-sm dir-ltr text-right leading-relaxed">
                                    Zone: <strong>{data.utm.zone}{data.utm.letter}</strong> <br/>
                                    E (X): <strong>{data.utm.easting.toFixed(2)}</strong> <br/>
                                    N (Y): <strong>{data.utm.northing.toFixed(2)}</strong>
                                </div>
                                <div className="text-sm mt-3 font-bold text-slate-600 border-t border-slate-200 pt-2 inline-block min-w-[50%]">
                                    גובה: {data.altitude !== null ? <span className="text-emerald-600">{data.altitude.toFixed(2)} מטר</span> : 'לא זמין במכשיר זה'}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ConverterWidget = () => {
            const [inputValue, setInputValue] = useState('');
            const [metricOption, setMetricOption] = useState('m');
            const [imperialOption, setImperialOption] = useState('ft');
            const [isMetricFirst, setIsMetricFirst] = useState(true);

            const handleSwap = () => setIsMetricFirst(!isMetricFirst);

            const fromUnit = isMetricFirst ? metricOption : imperialOption;
            const toUnit = isMetricFirst ? imperialOption : metricOption;

            const getConvertedValue = (val, from, to) => {
                if (!val) return '';
                const num = parseFloat(val);
                if (isNaN(num)) return '';
                let meters = 0;
                if (from === 'm') meters = num;
                if (from === 'km') meters = num * 1000;
                if (from === 'ft') meters = num / 3.28084;
                if (from === 'mi') meters = num / 0.000621371;

                let result = 0;
                if (to === 'm') result = meters;
                if (to === 'km') result = meters / 1000;
                if (to === 'ft') result = meters * 3.28084;
                if (to === 'mi') result = meters * 0.000621371;

                return Number.isInteger(result) ? result.toString() : result.toFixed(2);
            };

            const resultValue = getConvertedValue(inputValue, fromUnit, toUnit);

            return (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 mb-6 mx-4 fade-in">
                    <div className="text-sm font-bold text-slate-500 mb-3 flex items-center gap-2">

                    className: 'custom-map-marker',

                    iconSize: [30, 30],
                    iconAnchor: [15, 30]

                let marker = null;
                
                map.on('click', (e) => {
                    const { lat, lng } = e.latlng;
                    const coordsStr = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                    setCoords(coordsStr);
                    
                    if (marker) map.removeLayer(marker);
                    marker = window.L.marker([lat, lng], { icon: customIcon }).addTo(map);

                                <div className="bg-blue-500 p-4 text-white flex justify-between items-center shrink-0">
                                    <h2 className="text-lg font-bold flex items-center gap-2">
                                        <Icons.Book size={20} /> 
                                        {editingId ? 'עריכת נקודת המראה' : 'תיעוד נקודת המראה חדשה'}
                                    </h2>
                                    <button onClick={() => setModalOpen(false)} className="text-white/80"><Icons.X size={24} /></button>
                                </div>
                                <div className="p-5 space-y-4 overflow-y-auto flex-1">
                                    <input type="text" placeholder="עיר / כפר (לדוגמה: מג'דל שמס)" value={formData.locationName} onChange={e => setFormData({...formData, locationName: e.target.value})} className="w-full p-3 border-b border-gray-200 outline-none text-right bg-transparent placeholder-gray-400 font-bold" />
                                    
                                    <div className="flex gap-2">
                                        <input type="text" placeholder="נ.צ. במפה" value={formData.coordinates} onChange={e => setFormData({...formData, coordinates: e.target.value})} className="flex-1 p-3 border-b border-gray-200 outline-none text-right bg-transparent placeholder-gray-400 dir-ltr" />
                                        <button onClick={getCurrentLocation} className="p-3 bg-blue-50 text-blue-600 rounded-lg flex items-center gap-1 active:scale-95 text-sm font-bold border border-blue-100" title="GPS נוכחי">
                                            <Icons.Target size={18} /> GPS 
                                        </button>
                                        <button onClick={() => setShowMapPicker(true)} className="p-3 bg-gray-50 text-gray-600 rounded-lg flex items-center gap-1 active:scale-95 border border-gray-200 font-bold text-sm" title="בחר מהמפה">
                                            <Icons.MapPin size={18} /> מפה
                                        </button>
                                    </div>
                                    
                                    <textarea rows="4" placeholder="הערות חשובות (איפה חונים, סכנות, כיווני רוח...)" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} className="w-full p-3 bg-gray-50 rounded-lg border border-gray-100 outline-none resize-none"></textarea>
                                    
                                    <div>
                                        <label className="flex items-center gap-2 text-sm font-bold text-gray-600 mb-2"><Icons.Image size={16}/> תמונת השטח</label>
                                        <label className="border-2 border-dashed border-gray-300 rounded-xl p-6 flex flex-col items-center justify-center text-gray-400 cursor-pointer hover:bg-gray-50">
                                            {formData.image ? <img src={formData.image} className="h-20 object-contain" /> : <><span>לחץ להעלאה</span></>}
                                            <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                                        </label>
                                    </div>
                                </div>
                                <div className="p-4 border-t border-gray-100 shrink-0">
                                    <button onClick={handleSave} className="w-full bg-blue-500 text-white py-4 rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-2">
                                        שמור תיעוד
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* חלון המפה הפנימית */}
                    {showMapPicker && (
                        <MapPickerModal 
                            onClose={() => setShowMapPicker(false)} 
                            onSelect={(c) => { setFormData({...formData, coordinates: c}); setShowMapPicker(false); }} 
                        />
                    )}
                </div>
            );
        };

        // --- אפליקציה ראשית ---
        function App() {
            // טעינת משימות: מחפש גם במפתח שהיה בקובץ המקורי שלך (golan_tasks_v2) כדי לא לאבד נתונים
            const [tasks, setTasks] = useState(() => {
                const keys = ['golan_data_final', 'golan_tablet_db_v7', 'golan_tablet_db_v6', 'golan_tasks_v2', 'golan_tablet_db_v5', 'golan_tablet_db'];
                let foundData = null;
                for (let key of keys) {
                    const data = localStorage.getItem(key);
                    if (data) { foundData = JSON.parse(data); break; }
                }
                return foundData || [];
            });

            const [knowledgeItems, setKnowledgeItems] = useState(() => {
                const saved = localStorage.getItem('golan_knowledge_v1');
                return saved ? JSON.parse(saved) : [];
            });

            const [role, setRole] = useState(() => localStorage.getItem('golan_role') || 'technician');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [modalOpen, setModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [selectedImage, setSelectedImage] = useState(null);
            const [managerSearch, setManagerSearch] = useState('');
            const [showMapPicker, setShowMapPicker] = useState(false);
            
            // סטייט לניהול התראות קופצות חלופיות
            const [dialog, setDialog] = useState(null);
            
            const [formData, setFormData] = useState({
                customer: '', contact: '', area: '', address: '', phone: '', description: '', priority: 'normal', image: null
            });

            // שמירות אוטומטיות
            useEffect(() => { localStorage.setItem('golan_data_final', JSON.stringify(tasks)); }, [tasks]);
            useEffect(() => { localStorage.setItem('golan_knowledge_v1', JSON.stringify(knowledgeItems)); }, [knowledgeItems]);
            useEffect(() => { localStorage.setItem('golan_role', role); }, [role]);

            // סגירת תפריט בקליק מחוץ לו
            const menuRef = useRef();
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (menuRef.current && !menuRef.current.contains(event.target)) {
                        setIsMenuOpen(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [menuRef]);

            const showConfirm = (message, onConfirm) => setDialog({ message, onConfirm, type: 'confirm' });
            const showAlert = (message) => setDialog({ message, type: 'alert' });

            const handleEditTask = (task) => {
                setFormData({
                    customer: task.customer, contact: '', area: task.area || '', address: task.coordinates,
                    phone: task.contact, description: task.title, priority: task.priority, image: task.image
                });
                setEditingId(task.id);
                setModalOpen(true);
            };

            const handleSaveTask = () => {
                if (!formData.customer) return;
                const taskData = {
                    customer: formData.customer, title: formData.description || 'קריאה חדשה',
                    area: formData.area || 'כללי', coordinates: formData.address || '32.000, 35.000',
                    contact: formData.phone, priority: formData.priority, image: formData.image
                };
                if (editingId) {
                    setTasks(prev => prev.map(t => t.id === editingId ? { ...t, ...taskData } : t));
                } else {
                    setTasks([{ id: Date.now().toString(), ...taskData, status: 'pending', isActive: true }, ...tasks]);
                }
                setFormData({ customer: '', contact: '', area: '', address: '', phone: '', description: '', priority: 'normal', image: null });
                setEditingId(null);
                setModalOpen(false);
            };

            const downloadBackup = () => {
                const data = { tasks: tasks, knowledge: knowledgeItems };
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "golan_backup_" + new Date().toISOString().slice(0,10) + ".json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const triggerImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        if (imported.tasks || imported.knowledge || Array.isArray(imported)) {
                            showConfirm("קובץ תקין. לשחזר נתונים?", () => {
                                if(imported.tasks || imported.knowledge) {
                                    if(imported.tasks) setTasks(imported.tasks);
                                    if(imported.knowledge) setKnowledgeItems(imported.knowledge);
                                } else {
                                    setTasks(imported); 
                                }
                            });
                        } else {
                            showAlert("הקובץ אינו מכיל נתונים הנתמכים במערכת זו.");
                        }
                    } catch(err) { showAlert("שגיאה בקריאת הקובץ. ודא שזהו קובץ תקין."); }
                    e.target.value = null; // לאפשר העלאה מחדש של אותו הקובץ
                };
                reader.readAsText(file);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            const maxWidth = 500; 
                            const scaleSize = maxWidth / img.width;
                            canvas.width = maxWidth;
                            canvas.height = img.height * scaleSize;
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            setFormData(prev => ({ ...prev, image: canvas.toDataURL('image/jpeg', 0.5) }));
                        }
                        img.src = event.target.result;
                    }
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className="min-h-screen bg-[#F8FAFC]">
                    <div className="bg-white px-4 py-2 border-b-2 border-yellow-400 flex justify-between items-center sticky top-0 z-40">
                        {/* צד ימין - לוגו וטקסט */}
                        <div className="flex items-center gap-3">
                             <Logo size="small" />
                             <div className="w-px h-6 bg-gray-200 hidden sm:block"></div>
                             <span className="text-gray-400 font-medium text-xs hidden sm:block">מחויבים לרווח שלנו</span>
                        </div>

                        {/* צד שמאל - תפריט ממשקים נפתח */}
                        <div className="flex items-center gap-2" ref={menuRef}>
                            <div className="relative">
                                <button 
                                    onClick={() => setIsMenuOpen(!isMenuOpen)}
                                    className="flex items-center gap-1 bg-yellow-50 border border-yellow-200 px-3 py-1.5 rounded-lg text-sm font-bold text-gray-700 active:scale-95 transition-transform"
                                >
                                    {role === 'manager' ? 'ממשק מנהל' : role === 'technician' ? 'ממשק טכנאי' : 'ניהול ידע'}
                                    <Icons.ChevronDown size={14}/>
                                </button>
                                
                                {isMenuOpen && (
                                    <div className="absolute top-full left-0 mt-2 w-40 bg-white rounded-xl shadow-xl border border-gray-100 z-50 overflow-hidden flex flex-col text-right">
                                        <button onClick={() => {setRole('manager'); setIsMenuOpen(false);}} className={`px-4 py-3 text-sm font-bold border-b border-gray-50 active:bg-gray-50 ${role === 'manager' ? 'text-yellow-600 bg-yellow-50/50' : 'text-gray-700'}`}>ממשק מנהל</button>
                                        <button onClick={() => {setRole('technician'); setIsMenuOpen(false);}} className={`px-4 py-3 text-sm font-bold border-b border-gray-50 active:bg-gray-50 ${role === 'technician' ? 'text-yellow-600 bg-yellow-50/50' : 'text-gray-700'}`}>ממשק טכנאי</button>
                                        <button onClick={() => {setRole('knowledge'); setIsMenuOpen(false);}} className={`px-4 py-3 text-sm font-bold active:bg-gray-50 ${role === 'knowledge' ? 'text-blue-600 bg-blue-50/50' : 'text-gray-700'}`}>ניהול ידע</button>
                                    </div>
                                )}
                            </div>
                            <button className="text-gray-400 p-1"><Icons.User size={20}/></button>
                        </div>
                    </div>

                    {/* ניתוב הממשקים */}
                    {role === 'technician' && (
                        <TechnicianView 
                            tasks={tasks} 
                            updateStatus={(id, s) => setTasks(tasks.map(t => t.id === id ? {...t, status: s} : t))} 
                            setSelectedImage={setSelectedImage} 
                        />
                    )}
                    
                    {role === 'manager' && (
                        <ManagerView 
                            tasks={tasks} 
                            managerSearch={managerSearch} 
                            setManagerSearch={setManagerSearch} 
                            deleteTask={(id) => showConfirm('למחוק את המשימה?', () => setTasks(tasks.filter(t=>t.id!==id)))} 
                            handleEdit={handleEditTask} 
                            updateStatus={(id, s) => setTasks(tasks.map(t => t.id === id ? {...t, status: s} : t))} 
                            toggleActive={(id) => setTasks(tasks.map(t => t.id === id ? {...t, isActive: !t.isActive} : t))} 
                            setEditingId={setEditingId} 
                            setFormData={setFormData} 
                            setModalOpen={setModalOpen}
                            downloadBackup={downloadBackup}
                            triggerImport={triggerImport}
                        />
                    )}

                    {role === 'knowledge' && (
                        <KnowledgeView 
                            knowledgeItems={knowledgeItems}
                            setKnowledgeItems={setKnowledgeItems}
                            setSelectedImage={setSelectedImage}
                            downloadBackup={downloadBackup}
                            triggerImport={triggerImport}
                            showConfirm={showConfirm}
                            showAlert={showAlert}
                        />
                    )}

                    {/* מודל פתיחת קריאת שירות (מנהל) */}
                    {modalOpen && role === 'manager' && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/40 backdrop-blur-sm p-0 sm:p-4">
                            <div className="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-2xl shadow-2xl overflow-hidden modal-anim h-[90vh] sm:h-auto flex flex-col">
                                <div className="golan-gradient p-4 text-white flex justify-between items-center shrink-0">
                                    <h2 className="text-lg font-bold flex items-center gap-2">
                                        <span className="bg-white/20 p-1 rounded"><Logo size="small"/></span> 
                                        {editingId ? 'עריכת קריאת שירות' : 'פתיחת קריאה'}
                                    </h2>
                                    <button onClick={() => setModalOpen(false)} className="text-white/80 hover:text-white"><Icons.X size={24} /></button>
                                </div>
                                <div className="p-5 space-y-4 overflow-y-auto flex-1">
                                    <input type="text" placeholder="משימה" value={formData.customer} onChange={e => setFormData({...formData, customer: e.target.value})} className="w-full p-3 border-b border-gray-200 outline-none text-right bg-transparent placeholder-gray-400 font-bold" />
                                    <input type="text" placeholder="אזור (למשל: רמת הגולן)" value={formData.area} onChange={e => setFormData({...formData, area: e.target.value})} className="w-full p-3 border-b border-gray-200 outline-none text-right bg-transparent placeholder-gray-400" />
                                    
                                    <div className="flex gap-2">
                                        <input type="text" placeholder="נ.צ / כתובת מדויקת לניווט" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} className="flex-1 p-3 border-b border-gray-200 outline-none text-right bg-transparent placeholder-gray-400 dir-ltr" />
                                        <button onClick={() => setShowMapPicker(true)} className="p-3 bg-gray-50 text-gray-600 rounded-lg flex items-center gap-1 active:scale-95 border border-gray-200 font-bold text-sm" title="בחר מהמפה">
                                            <Icons.MapPin size={18} /> מפה
                                        </button>
                                    </div>
                                    
                                    <div className="flex gap-4">
                                        <input type="tel" placeholder="טלפון" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} className="w-1/2 p-3 border-b border-gray-200 outline-none text-right bg-transparent placeholder-gray-400" />
                                        <select value={formData.priority} onChange={e => setFormData({...formData, priority: e.target.value})} className="w-1/2 p-3 border-b border-gray-200 outline-none text-gray-600 bg-transparent">
                                            <option value="normal">עדיפות רגילה</option>
                                            <option value="high">עדיפות גבוהה</option>
                                        </select>
                                    </div>
                                    <textarea rows="3" placeholder="תיאור התקלה..." value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className="w-full p-3 bg-gray-50 rounded-lg border border-gray-100 outline-none resize-none"></textarea>
                                    <div>
                                        <label className="flex items-center gap-2 text-sm font-bold text-gray-600 mb-2"><Icons.Image size={16}/> תמונות</label>
                                        <label className="border-2 border-dashed border-gray-300 rounded-xl p-6 flex flex-col items-center justify-center text-gray-400 cursor-pointer hover:bg-gray-50">
                                            {formData.image ? <img src={formData.image} className="h-20 object-contain" /> : <><span>לחץ להעלאה</span></>}
                                            <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                                        </label>
                                    </div>
                                </div>
                                <div className="p-4 border-t border-gray-100 shrink-0">
                                    <button onClick={handleSaveTask} className="w-full golan-gradient text-white py-4 rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-2">
                                        {editingId ? 'שמור שינויים' : 'שלח קריאה'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* חלון המפה הפנימית לבחירת קואורדינטות (משותף למנהל ולידע) */}
                    {showMapPicker && (
                        <MapPickerModal 
                            onClose={() => setShowMapPicker(false)} 
                            onSelect={(c) => { setFormData({...formData, address: c, coordinates: c}); setShowMapPicker(false); }} 
                        />
                    )}

                    {/* מודל הגדלת תמונה גלובלי */}
                    {selectedImage && (
                        <div 
                            className="fixed inset-0 z-[60] bg-black/90 flex items-center justify-center p-4 fade-in"
                            onClick={() => setSelectedImage(null)}
                        >
                            <button 
                                onClick={() => setSelectedImage(null)}
                                className="absolute top-6 right-6 text-white/80 bg-white/10 rounded-full p-2 hover:bg-white/20"
                            >
                                <Icons.X size={32} />
                            </button>
                            <img 
                                src={selectedImage} 
                                className="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl" 
                                onClick={(e) => e.stopPropagation()} 
                            />
                        </div>
                    )}

                    {/* מודל התראות / אישורים גלובלי */}
                    <CustomDialog dialog={dialog} onClose={() => setDialog(null)} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
